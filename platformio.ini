; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Shared base configuration for all build profiles below.
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
upload_port = COM5
monitor_port = COM5
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    TaskScheduler
    adafruit/Adafruit Unified Sensor @ ^1.1.4
    adafruit/DHT sensor library @ ^1.4.6
build_flags =
    -std=gnu++11
    -Ilib/ICSN
    -Ilib/ICSN/controller
    -Ilib/ICSN/data_structure
    -Ilib/ICSN/entity
    -Ilib/ICSN/infrastructure
    -Ilib/ICSN/interface
    -Ilib/ICSN/use_case

[env:normal]
build_flags =
    ${env.build_flags}
    -DICSN_BUILD_PROFILE=1

[env:perf]
build_flags =
    ${env.build_flags}
    -DICSN_BUILD_PROFILE=2
    -DPERFORMANCE_MEASURE

[env:release]
build_flags =
    ${env.build_flags}
    -DICSN_BUILD_PROFILE=3
