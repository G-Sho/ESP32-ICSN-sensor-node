; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
upload_port = COM5
monitor_port = COM5
lib_deps =
    ;painlessmesh/painlessMesh @ ^1.4.5
    bblanchon/ArduinoJson@^6.21.4
    ;arduinoUnity
    ;AsyncTCP
    TaskScheduler
    adafruit/Adafruit Unified Sensor @ ^1.1.4
    ;arduino-libraries/Arduino_JSON @ ^0.1.0
    adafruit/DHT sensor library @ ^1.4.6
build_flags = 
    -std=gnu++11
    -Ilib/ICSN
    -Ilib/ICSN/controller
    -Ilib/ICSN/data_structure
    -Ilib/ICSN/entity
    -Ilib/ICSN/infrastructure
    -Ilib/ICSN/interface
    -Ilib/ICSN/use_case

; === テスト用環境: gateway -> bridge -> sensor(A) -> sensor(B) -> sensor(C) ===
; 各ロールに応じた設定ファイル (data/config_a.json 等) をLittleFSに書き込んでください。
; ビルド前に upload_port / monitor_port を接続デバイスに合わせて変更してください。

[env:test_sensor_a]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    TaskScheduler
    adafruit/Adafruit Unified Sensor @ ^1.1.4
    adafruit/DHT sensor library @ ^1.4.6
build_flags =
    -std=gnu++11
    -Ilib/ICSN
    -Ilib/ICSN/controller
    -Ilib/ICSN/data_structure
    -Ilib/ICSN/entity
    -Ilib/ICSN/infrastructure
    -Ilib/ICSN/interface
    -Ilib/ICSN/use_case
    -DTEST_NODE_ROLE=1

